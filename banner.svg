<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2027">
        <animate attributeName="stop-color" values="#0F2027;#16222A;#0F2027" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#203A43">
        <animate attributeName="stop-color" values="#203A43;#2C5364;#203A43" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#2C5364">
        <animate attributeName="stop-color" values="#2C5364;#203A43;#2C5364" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="900" height="260" rx="16" fill="url(#bg)"/>

  <!-- Grid sutil -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="65" x2="900" y2="65"/>
    <line x1="0" y1="130" x2="900" y2="130"/>
    <line x1="0" y1="195" x2="900" y2="195"/>
    <line x1="180" y1="0" x2="180" y2="260"/>
    <line x1="360" y1="0" x2="360" y2="260"/>
    <line x1="540" y1="0" x2="540" y2="260"/>
    <line x1="720" y1="0" x2="720" y2="260"/>
  </g>

  <!-- Puntos flotantes -->
  <g fill="#58a6ff">
    <circle cx="120" cy="60" r="3" opacity="0.6">
      <animate attributeName="cy" values="60;45;60" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="200" r="4" opacity="0.5">
      <animate attributeName="cy" values="200;185;200" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="70" r="2.5" opacity="0.7">
      <animate attributeName="cy" values="70;55;70" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="190" r="3.5" opacity="0.5">
      <animate attributeName="cy" values="190;175;190" dur="5.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Barra de acento -->
  <rect x="60" y="98" width="0" height="4" rx="2" fill="url(#accent)">
    <animate attributeName="width" from="0" to="70" dur="1.2s" fill="freeze"/>
  </rect>

  <!-- Nombre -->
  <text x="60" y="140" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="52" font-weight="800" fill="#ffffff" filter="url(#glow)" opacity="0">
    Fernando Lezcano
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0.3s" fill="freeze"/>
  </text>

  <!-- Subtítulo -->
  <text x="62" y="178" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="500" fill="#9fd3ff" opacity="0" letter-spacing="1">
    Software Engineer · Full-Stack · Data &amp; AI
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0.8s" fill="freeze"/>
  </text>

  <!-- Chips -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="1.2s" fill="freeze"/>
    <g>
      <rect x="62" y="200" width="80" height="26" rx="13" fill="#58a6ff" fill-opacity="0.15" stroke="#58a6ff" stroke-opacity="0.4"/>
      <text x="102" y="217" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#9fd3ff" text-anchor="middle">Python</text>
    </g>
    <g>
      <rect x="150" y="200" width="70" height="26" rx="13" fill="#58a6ff" fill-opacity="0.15" stroke="#58a6ff" stroke-opacity="0.4"/>
      <text x="185" y="217" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#9fd3ff" text-anchor="middle">Odoo</text>
    </g>
    <g>
      <rect x="228" y="200" width="72" height="26" rx="13" fill="#58a6ff" fill-opacity="0.15" stroke="#58a6ff" stroke-opacity="0.4"/>
      <text x="264" y="217" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#9fd3ff" text-anchor="middle">Kotlin</text>
    </g>
    <g>
      <rect x="308" y="200" width="60" height="26" rx="13" fill="#58a6ff" fill-opacity="0.15" stroke="#58a6ff" stroke-opacity="0.4"/>
      <text x="338" y="217" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#9fd3ff" text-anchor="middle">NLP</text>
    </g>
  </g>

  <!-- Símbolo de código decorativo -->
  <text x="820" y="150" font-family="'Fira Code', monospace" font-size="90" font-weight="700" fill="#58a6ff" fill-opacity="0.12" text-anchor="middle">&lt;/&gt;</text>

  <!-- Línea de escaneo animada -->
  <rect x="0" y="0" width="4" height="260" fill="#22d3ee" opacity="0.35">
    <animate attributeName="x" values="-10;900" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>
